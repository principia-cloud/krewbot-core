<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Static favicon. Overlay deployments swap web/public/favicon.svg
         for a branded asset; no env placeholder needed. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Document title is set at runtime from APP_TITLE so it tracks
         VITE_APP_TITLE without depending on Vite's HTML-placeholder
         substitution (which has no fallback when env is unset). See
         main.tsx. -->
    <title>Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-[#fafbfd] text-[#0f172a] antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
